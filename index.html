<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>第二球颜色的均值–方差相图</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<style>
  html, body { margin: 0; padding: 0; background: #D6D6D6; }
  body { font-family: 'Helvetica Neue', Arial, 'PingFang SC', 'Noto Sans SC', sans-serif; }
</style>
</head>
<body>
<div id="preview-app"></div>
<script>
(function () {
  const { useRef, useState, useMemo, useCallback } = React;
  const h = React.createElement;

  const M = 314;
  const W = 960, H = 660;
  const MG = { t: 58, r: 50, b: 78, l: 95 };
  const IW = W - MG.l - MG.r;
  const IH = H - MG.t - MG.b;
  const MU_END = 325, S2_END = 26000;

  const xS = mu => MG.l + (mu / MU_END) * IW;
  const yS = s2 => MG.t + IH * (1 - s2 / S2_END);
  const critRaw = mu => mu * (315 - 2 * mu) / 2;
  const critPos = mu => Math.max(0, critRaw(mu));
  const popov  = mu => Math.max(0, mu * (M - mu));

  function curve(fn, a, b, step = 0.5) {
    const p = [];
    for (let t = a; t < b - 0.001; t += step) p.push([xS(t), yS(fn(t))]);
    p.push([xS(b), yS(fn(b))]);
    return p;
  }
  function pd(pts, close) {
    return pts.map(([x, y], i) => `${i ? 'L' : 'M'}${x.toFixed(1)},${y.toFixed(1)}`).join(' ') + (close ? ' Z' : '');
  }

  const C = {
    infeasible: '#BEBEBE',
    white: '#FFFFFF',
    black: '#141414',
    parabola: '#D49000',
    popov: '#4F6AAE',
    mu157: '#18946E',
    axis: '#111',
    grid: '#E0E0E0',
    ptDark: '#CC2828',
    ptLight: '#1654BB',
  };
  const FONT = "'Helvetica Neue',Arial,'PingFang SC','Noto Sans SC',sans-serif";

  function Halo(props) {
    const { children, color = '#fff', width = 3, style, ...rest } = props;
    return h('text', {
      ...rest,
      style: { paintOrder: 'stroke', ...(style || {}) },
      stroke: color,
      strokeWidth: width,
      strokeLinejoin: 'round'
    }, children);
  }

  function PhaseDiagram() {
    const svgRef = useRef(null);
    const [tip, setTip] = useState(null);

    const paths = useMemo(() => {
      const cPts = curve(critPos, 0, 157.5);
      const pPts = curve(popov, 0, M);
      return {
        darkD: pd([[xS(0), yS(0)], ...cPts, [xS(157.5), yS(0)]], true),
        lightD: pd([...pPts, [xS(M), yS(0)], [xS(157.5), yS(0)], ...cPts.slice().reverse()], true),
        cLine: pd(cPts),
        pLine: pd(pPts),
      };
    }, []);

    const onMouse = useCallback(e => {
      const svg = svgRef.current;
      if (!svg) return;
      const r = svg.getBoundingClientRect();
      const sx = (e.clientX - r.left) / r.width * W;
      const sy = (e.clientY - r.top) / r.height * H;
      const mu = (sx - MG.l) / IW * MU_END;
      const s2 = (1 - (sy - MG.t) / IH) * S2_END;
      if (mu < 0.3 || mu > M + 2 || s2 < -400) return setTip(null);
      const pMax = popov(Math.min(mu, M));
      if (s2 > pMax + 500) return setTip(null);
      const s2c = Math.max(0, Math.min(s2, pMax));
      const muStar = mu + s2c / mu;
      const p = Math.max(0, Math.min(1, (muStar - 1) / (M - 1)));
      const sc = critRaw(mu);
      const rg = s2c > sc + 5 ? '偏白' : s2c < sc - 5 ? '偏黑' : '平衡';
      setTip({ mu, s2: s2c, muStar, p, rg, sx, sy });
    }, []);

    const ay = yS(0);
    const muTicks = [0, 50, 100, 200, 250, M];
    const s2Ticks = [0, 5000, 10000, 15000, 20000, 25000];

    return h('div', {
      style: { display: 'flex', flexDirection: 'column', alignItems: 'center', width: '100%', padding: '12px 8px', background: '#D6D6D6' }
    },
      h('svg', {
        ref: svgRef,
        viewBox: `0 0 ${W} ${H}`,
        style: { width: '100%', maxWidth: '960px', cursor: 'crosshair', userSelect: 'none', boxShadow: '0 4px 20px rgba(0,0,0,0.18)', borderRadius: '6px', background: '#D6D6D6' },
        onMouseMove: onMouse,
        onMouseLeave: () => setTip(null),
        fontFamily: FONT
      },
        /* Infeasible background */
        h('rect', { x: MG.l, y: MG.t, width: IW, height: IH, fill: C.infeasible, rx: '2' }),

        /* Regions */
        h('path', { d: paths.lightD, fill: C.white }),
        h('path', { d: paths.darkD, fill: C.black }),

        /* Grid */
        muTicks.map(t => h('line', { key: 'gx' + t, x1: xS(t), x2: xS(t), y1: MG.t, y2: ay, stroke: C.grid, strokeWidth: 0.5 })),
        s2Ticks.map(t => h('line', { key: 'gy' + t, x1: MG.l, x2: MG.l + IW, y1: yS(t), y2: yS(t), stroke: C.grid, strokeWidth: 0.5 })),

        /* μ = 157.5 vertical */
        h('line', { x1: xS(157.5), x2: xS(157.5), y1: MG.t, y2: ay, stroke: C.mu157, strokeWidth: 2.2, strokeDasharray: '8 5' }),

        /* Popoviciu bound */
        h('path', { d: paths.pLine, fill: 'none', stroke: C.popov, strokeWidth: 2.5, strokeDasharray: '10 5' }),

        /* Critical parabola */
        h('path', { d: paths.cLine, fill: 'none', stroke: C.parabola, strokeWidth: 3.5 }),

        /* ====== Region Labels ====== */
        h('text', { x: xS(100), y: yS(15800), fill: '#000000', fontSize: '42', fontWeight: '900', textAnchor: 'middle' }, '偏白区'),
        h('text', { x: xS(100), y: yS(15800) + 32, fill: '#000000', fontSize: '16', textAnchor: 'middle' }, 'P(W₂=白 | W₁=白) > ½'),

        h(Halo, { x: xS(58), y: yS(2900), fill: '#000000', fontSize: '26', fontWeight: '900', textAnchor: 'middle', color: '#ffffff', width: 5 }, '偏黑区'),
        h(Halo, { x: xS(58), y: yS(2900) + 22, fill: '#000000', fontSize: '14', textAnchor: 'middle', color: '#ffffff', width: 4 }, 'P(W₂=白 | W₁=白) < ½'),

        /* 不可行域 */
        h('text', { x: xS(258), y: yS(22500), fill: '#969696', fontSize: '15', fontWeight: '600', textAnchor: 'middle' }, '不可行域'),

        /* Critical parabola annotation */
        h(Halo, { x: xS(40), y: yS(critPos(40)) - 21, fill: '#A97200', fontSize: '15', fontWeight: '700', textAnchor: 'middle', color: '#fff', width: 4 }, '临界抛物线'),
        h(Halo, { x: xS(40), y: yS(critPos(40)) - 4, fill: '#A97200', fontSize: '12.5', textAnchor: 'middle', color: '#fff', width: 3 }, 'σ² = μ(315−2μ)/2'),

        /* Popoviciu annotation */
        h(Halo, { x: xS(265), y: yS(popov(265)) - 17, fill: C.popov, fontSize: '15', fontWeight: '700', textAnchor: 'middle', color: '#fff', width: 3.5 }, '波波维奇亚上界'),
        h(Halo, { x: xS(265), y: yS(popov(265)) + 1, fill: C.popov, fontSize: '12.5', textAnchor: 'middle', color: '#fff', width: 3 }, 'σ² = μ(314−μ)'),

        /* μ = 157.5 annotation */
        h(Halo, { x: xS(157.5) - 10, y: MG.t + 20, fill: C.mu157, fontSize: '14', fontWeight: '700', textAnchor: 'end', color: '#fff', width: 3.5 }, 'μ = 157.5'),

        /* Vertex */
        h('circle', { cx: xS(78.75), cy: yS(6201.5625), r: 5, fill: C.parabola, stroke: '#fff', strokeWidth: 2 }),
        h(Halo, { x: xS(78.75) + 10, y: yS(6201.5625) + 5, fill: '#8B6500', fontSize: '12', fontWeight: '600', color: '#fff', width: 3 }, '顶点 (P = 50%，μ∗ = 157.5，σ² ≈ 6202)'),

        /* Connection line */
        h('line', { x1: xS(157), x2: xS(157), y1: yS(600), y2: yS(24000), stroke: '#999', strokeWidth: 1.3, strokeDasharray: '5 4' }),

        /* §2.1 */
        h('circle', { cx: xS(157), cy: yS(0), r: 8.5, fill: C.ptDark, stroke: '#fff', strokeWidth: 3 }),
        h(Halo, { x: xS(157) + 15, y: ay - 26, fill: C.ptDark, fontSize: '15', fontWeight: '700', color: '#fff', width: 3.5 }, '§2.1  确定 k = 157'),
        h(Halo, { x: xS(157) + 15, y: ay - 8, fill: '#555', fontSize: '13', fontWeight: '500', color: '#fff', width: 3 }, 'σ² = 0，P ≈ 49.8%（偏黑）'),

        /* §2.2 */
        h('circle', { cx: xS(157), cy: yS(24649), r: 8.5, fill: C.ptLight, stroke: '#fff', strokeWidth: 3 }),
        h(Halo, { x: xS(157) + 15, y: yS(24649) + 6, fill: C.ptLight, fontSize: '15', fontWeight: '700', color: '#fff', width: 3.5 }, '§2.2  全白或全黑'),
        h(Halo, { x: xS(157) + 15, y: yS(24649) + 25, fill: '#555', fontSize: '13', fontWeight: '500', color: '#fff', width: 3 }, 'σ² = 24649，P = 100%（偏白）'),

        /* Axes */
        h('line', { x1: MG.l, x2: MG.l + IW, y1: ay, y2: ay, stroke: C.axis, strokeWidth: 2 }),
        h('line', { x1: MG.l, x2: MG.l, y1: MG.t, y2: ay, stroke: C.axis, strokeWidth: 2 }),

        /* X ticks */
        muTicks.map(t => h('g', { key: 'tx' + t },
          h('line', { x1: xS(t), x2: xS(t), y1: ay, y2: ay + 7, stroke: C.axis, strokeWidth: 1.5 }),
          h('text', { x: xS(t), y: ay + 23, fill: '#333', fontSize: '13', fontWeight: '500', textAnchor: 'middle' }, t)
        )),
        h('line', { x1: xS(157.5), x2: xS(157.5), y1: ay, y2: ay + 5, stroke: C.mu157, strokeWidth: 1.5 }),
        h('text', { x: xS(157.5), y: ay + 23, fill: C.mu157, fontSize: '12', fontWeight: '600', textAnchor: 'middle' }, '157.5'),

        /* Y ticks */
        s2Ticks.map(t => h('g', { key: 'ty' + t },
          h('line', { x1: MG.l - 7, x2: MG.l, y1: yS(t), y2: yS(t), stroke: C.axis, strokeWidth: 1.5 }),
          h('text', { x: MG.l - 12, y: yS(t) + 5, fill: '#333', fontSize: '13', fontWeight: '500', textAnchor: 'end' }, t === 0 ? '0' : (t / 1000) + 'k')
        )),

        /* Axis titles */
        h('text', { x: MG.l + IW / 2, y: H - 10, fill: '#222', fontSize: '17', fontWeight: '600', textAnchor: 'middle' }, 'μ（白球数均值）'),
        h('text', { x: 22, y: MG.t + IH / 2, fill: '#222', fontSize: '17', fontWeight: '600', textAnchor: 'middle', transform: `rotate(-90,22,${MG.t + IH / 2})` }, 'σ²（白球数方差）'),

        /* Title */
        h('text', { x: W / 2, y: 26, fill: '#111', fontSize: '22', fontWeight: '800', textAnchor: 'middle' }, '第二球颜色的均值–方差相图'),
        h('text', { x: W / 2, y: 46, fill: '#CC2222', fontSize: '14', fontWeight: '500', textAnchor: 'middle' }, 'M = 314 ｜ 第一球为白色 ｜ 鼠标悬停查看条件概率'),

        /* Hover crosshair */
        tip && h('g', null,
          h('line', { x1: tip.sx, x2: tip.sx, y1: MG.t, y2: ay, stroke: '#444', strokeWidth: 0.7, strokeDasharray: '4 3', opacity: 0.4 }),
          h('line', { x1: MG.l, x2: MG.l + IW, y1: tip.sy, y2: tip.sy, stroke: '#444', strokeWidth: 0.7, strokeDasharray: '4 3', opacity: 0.4 }),
          h('circle', { cx: tip.sx, cy: tip.sy, r: 5.5, fill: 'none', stroke: '#222', strokeWidth: 2.2 })
        )
      ),

      /* Tooltip bar */
      h('div', {
        style: { height: '42px', display: 'flex', alignItems: 'center', justifyContent: 'center', marginTop: '8px', width: '100%', maxWidth: '960px' }
      },
        tip
          ? h('div', {
              style: { padding: '6px 18px', background: '#1A1A1A', color: '#EEE', borderRadius: '8px', fontSize: '14px', fontFamily: "'SF Mono','Fira Code',monospace", whiteSpace: 'nowrap', letterSpacing: '0.3px' }
            },
              'μ=', tip.mu.toFixed(1), '　σ²=', tip.s2.toFixed(0), '　μ*=', tip.muStar.toFixed(1),
              '　P(W₂=白|W₁=白)=', (tip.p * 100).toFixed(1), '%　',
              h('span', {
                style: { fontWeight: 'bold', color: tip.rg === '偏白' ? '#7DD3FC' : tip.rg === '偏黑' ? '#FCA5A5' : '#FDE68A' }
              }, tip.rg)
            )
          : h('span', {
              style: { color: '#1654BB', fontSize: '14px', fontWeight: '500' }
            }, '鼠标悬停图中查看任意 (μ, σ²) 对应的条件概率')
      ),

      /* Legend */
      h('div', {
        style: { display: 'flex', flexWrap: 'wrap', justifyContent: 'center', gap: '22px', marginTop: '12px', fontSize: '14px', color: '#444', fontWeight: '500' }
      },
        h('span', { style: { display: 'flex', alignItems: 'center', gap: '7px' } },
          h('span', { style: { display: 'inline-block', width: '20px', height: '14px', background: '#fff', border: '2px solid #999', borderRadius: '3px' } }), '偏白区'
        ),
        h('span', { style: { display: 'flex', alignItems: 'center', gap: '7px' } },
          h('span', { style: { display: 'inline-block', width: '20px', height: '14px', background: C.black, borderRadius: '3px' } }), '偏黑区'
        ),
        h('span', { style: { display: 'flex', alignItems: 'center', gap: '7px' } },
          h('span', { style: { display: 'inline-block', width: '22px', borderTop: `3.5px solid ${C.parabola}` } }), '临界抛物线'
        ),
        h('span', { style: { display: 'flex', alignItems: 'center', gap: '7px' } },
          h('span', { style: { display: 'inline-block', width: '22px', borderTop: `2.5px dashed ${C.popov}` } }), '波波维奇亚上界'
        )
      )
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('preview-app'));
  root.render(h(PhaseDiagram));
})();
</script>
</body>
</html>
